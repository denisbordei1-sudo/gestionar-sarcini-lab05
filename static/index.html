<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar de sarcini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand fw-bold">Gestionar de sarcini</span>
        <div id="info-utilizator" class="d-none align-items-center gap-3">
            <span id="contor-sarcini" class="badge bg-light text-primary"></span>
            <span id="email-utilizator" class="text-white small"></span>
            <button class="btn btn-outline-light btn-sm" onclick="deconecteaza()">Deconectare</button>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div id="sectiune-auth">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div id="form-inregistrare" class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Înregistrare</h5>
                        <div id="eroare-inregistrare" class="alert alert-danger d-none"></div>
                        <div id="succes-inregistrare" class="alert alert-success d-none"></div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="reg-email" class="form-control" placeholder="student@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Parolă</label>
                            <input type="password" id="reg-parola" class="form-control" placeholder="minimum 8 caractere">
                        </div>
                        <button class="btn btn-primary w-100" onclick="inregistreaza()">Înregistrează-te</button>
                        <p class="text-center mt-3 mb-0">
                            Ai deja cont? <a href="#" onclick="comutaFormular(); return false;">Autentifică-te</a>
                        </p>
                    </div>
                </div>

                <div id="form-autentificare" class="card shadow-sm d-none">
                    <div class="card-body">
                        <h5 class="card-title">Autentificare</h5>
                        <div id="eroare-autentificare" class="alert alert-danger d-none"></div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="auth-email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Parolă</label>
                            <input type="password" id="auth-parola" class="form-control">
                        </div>
                        <button class="btn btn-primary w-100" onclick="autentifica()">Conectează-te</button>
                        <p class="text-center mt-3 mb-0">
                            Nu ai cont? <a href="#" onclick="comutaFormular(); return false;">Înregistrează-te</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="sectiune-sarcini" class="d-none">
        <div id="mesaj-general" class="alert d-none"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title">Adaugă o sarcină</h5>
                <div class="row g-2">
                    <div class="col-md-4">
                        <input type="text" id="sarcina-titlu" class="form-control" placeholder="Titlu">
                    </div>
                    <div class="col-md-6">
                        <input type="text" id="sarcina-descriere" class="form-control" placeholder="Descriere opțională">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-success w-100" onclick="adaugaSarcina()">Adaugă</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="mb-0">Sarcinile mele</h5>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="doar-nefinalizate" onchange="incarcaSarcini()">
                <label class="form-check-label" for="doar-nefinalizate">
                    Afișează doar sarcinile nefinalizate
                </label>
            </div>
        </div>

        <div id="lista-sarcini"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "";
    let sarciniCurente = [];

    function salveazaToken(token) { localStorage.setItem("token", token); }
    function obtineToken() { return localStorage.getItem("token"); }
    function deconecteaza() {
        localStorage.removeItem("token");
        sarciniCurente = [];
        actualizeazaUI();
    }

    function actualizeazaUI() {
        const token = obtineToken();
        if (token) {
            document.getElementById("sectiune-auth").classList.add("d-none");
            document.getElementById("sectiune-sarcini").classList.remove("d-none");
            document.getElementById("info-utilizator").classList.remove("d-none");
            document.getElementById("info-utilizator").classList.add("d-flex");
            try {
                const payload = JSON.parse(atob(token.split(".")[1]));
                document.getElementById("email-utilizator").textContent = payload.sub;
            } catch (e) {
                document.getElementById("email-utilizator").textContent = "utilizator autentificat";
            }
            incarcaSarcini();
        } else {
            document.getElementById("sectiune-auth").classList.remove("d-none");
            document.getElementById("sectiune-sarcini").classList.add("d-none");
            document.getElementById("info-utilizator").classList.add("d-none");
            document.getElementById("info-utilizator").classList.remove("d-flex");
            document.getElementById("contor-sarcini").textContent = "";
        }
    }

    function comutaFormular() {
        document.getElementById("form-inregistrare").classList.toggle("d-none");
        document.getElementById("form-autentificare").classList.toggle("d-none");
    }

    async function inregistreaza() {
        ascundeMesaj("eroare-inregistrare");
        ascundeMesaj("succes-inregistrare");
        const email = document.getElementById("reg-email").value.trim();
        const parola = document.getElementById("reg-parola").value;
        try {
            const raspuns = await fetch(`${API}/inregistrare`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, parola })
            });
            if (!raspuns.ok) {
                const eroare = await raspuns.json();
                afiseazaMesaj("eroare-inregistrare", eroare.detail || "Eroare la înregistrare.", "danger");
                return;
            }
            afiseazaMesaj("succes-inregistrare", "Cont creat. Acum te poți autentifica.", "success");
            setTimeout(comutaFormular, 1200);
        } catch {
            afiseazaMesaj("eroare-inregistrare", "Nu se poate contacta serverul.", "danger");
        }
    }

    async function autentifica() {
        ascundeMesaj("eroare-autentificare");
        const email = document.getElementById("auth-email").value.trim();
        const parola = document.getElementById("auth-parola").value;
        const dateFormular = new URLSearchParams();
        dateFormular.append("username", email);
        dateFormular.append("password", parola);
        try {
            const raspuns = await fetch(`${API}/autentificare`, {
                method: "POST",
                body: dateFormular
            });
            if (!raspuns.ok) {
                afiseazaMesaj("eroare-autentificare", "Email sau parolă incorecte.", "danger");
                return;
            }
            const date = await raspuns.json();
            salveazaToken(date.access_token);
            actualizeazaUI();
        } catch {
            afiseazaMesaj("eroare-autentificare", "Nu se poate contacta serverul.", "danger");
        }
    }

    async function incarcaSarcini() {
        const token = obtineToken();
        const checkbox = document.getElementById("doar-nefinalizate");
        const doarNefinalizate = checkbox && checkbox.checked;
        const url = doarNefinalizate ? `${API}/sarcini?doar_nefinalizate=true` : `${API}/sarcini`;
        try {
            const raspuns = await fetch(url, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (raspuns.status === 401) { deconecteaza(); return; }
            if (!raspuns.ok) return;
            sarciniCurente = await raspuns.json();
            randeazaSarcini(sarciniCurente);
        } catch {
            document.getElementById("lista-sarcini").innerHTML =
                `<div class="alert alert-warning">Nu se poate contacta serverul. Verifică dacă uvicorn rulează.</div>`;
        }
    }

    function randeazaSarcini(sarcini) {
        const container = document.getElementById("lista-sarcini");
        actualizeazaContor(sarcini);
        if (sarcini.length === 0) {
            container.innerHTML = `<p class="text-muted">Nu există sarcini pentru filtrul selectat.</p>`;
            return;
        }
        container.innerHTML = sarcini.map(s => `
            <div class="card shadow-sm mb-2" id="card-sarcina-${s.id}">
                <div class="card-body d-flex justify-content-between align-items-start">
                    <div>
                        <h6 class="mb-1">
                            ${escapeHtml(s.titlu)}
                            <span class="badge ${s.finalizata ? 'bg-success' : 'bg-secondary'} ms-2">
                                ${s.finalizata ? 'Finalizată' : 'În progres'}
                            </span>
                        </h6>
                        <p class="text-muted small mb-0">${escapeHtml(s.descriere || '')}</p>
                    </div>
                    <div class="d-flex gap-2 ms-3 flex-shrink-0">
                        <button class="btn btn-sm btn-outline-primary" onclick="pornesteEditare(${s.id})">Editează</button>
                        <button class="btn btn-sm btn-outline-success" onclick="finalizeazaSarcina(${s.id})" ${s.finalizata ? 'disabled' : ''}>Finalizează</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="stergeSarcina(${s.id})">Șterge</button>
                    </div>
                </div>
            </div>
        `).join("");
    }

    function pornesteEditare(id) {
        const sarcina = sarciniCurente.find(s => s.id === id);
        if (!sarcina) return;
        const card = document.getElementById(`card-sarcina-${id}`);
        card.innerHTML = `
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-4">
                        <input type="text" id="edit-titlu-${id}" class="form-control" value="${escapeAtribut(sarcina.titlu)}">
                    </div>
                    <div class="col-md-5">
                        <input type="text" id="edit-descriere-${id}" class="form-control" value="${escapeAtribut(sarcina.descriere || '')}">
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button class="btn btn-sm btn-success w-100" onclick="salveazaEditare(${id})">Salvează</button>
                        <button class="btn btn-sm btn-secondary w-100" onclick="randeazaSarcini(sarciniCurente)">Anulează</button>
                    </div>
                </div>
            </div>`;
    }

    async function salveazaEditare(id) {
        const titlu = document.getElementById(`edit-titlu-${id}`).value.trim();
        const descriere = document.getElementById(`edit-descriere-${id}`).value.trim();
        if (!titlu) {
            alert("Titlul nu poate fi gol.");
            return;
        }
        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ titlu, descriere })
            });
            if (raspuns.ok) incarcaSarcini();
        } catch {
            alert("Nu se poate contacta serverul.");
        }
    }

    async function adaugaSarcina() {
        const titlu = document.getElementById("sarcina-titlu").value.trim();
        const descriere = document.getElementById("sarcina-descriere").value.trim();
        if (!titlu) return;
        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ titlu, descriere })
            });
            if (raspuns.ok) {
                document.getElementById("sarcina-titlu").value = "";
                document.getElementById("sarcina-descriere").value = "";
                incarcaSarcini();
            }
        } catch {
            alert("Nu se poate contacta serverul.");
        }
    }

    async function finalizeazaSarcina(id) {
        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}/finalizeaza`, {
                method: "PATCH",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (raspuns.ok) incarcaSarcini();
        } catch {
            alert("Nu se poate contacta serverul.");
        }
    }

    async function stergeSarcina(id) {
        if (!confirm("Ești sigur că vrei să ștergi această sarcină?")) return;
        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (raspuns.ok) incarcaSarcini();
        } catch {
            alert("Nu se poate contacta serverul.");
        }
    }

    function actualizeazaContor(sarcini) {
        const total = sarcini.length;
        const finalizate = sarcini.filter(s => s.finalizata).length;
        document.getElementById("contor-sarcini").textContent = `${total} sarcini / ${finalizate} finalizate`;
    }

    function afiseazaMesaj(elementId, mesaj, tip) {
        const el = document.getElementById(elementId);
        el.textContent = mesaj;
        el.className = `alert alert-${tip}`;
    }

    function ascundeMesaj(elementId) {
        const el = document.getElementById(elementId);
        el.classList.add("d-none");
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = String(text);
        return div.innerHTML;
    }

    function escapeAtribut(text) {
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll('"', "&quot;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
    }

    document.addEventListener("DOMContentLoaded", actualizeazaUI);
</script>
</body>
</html>
